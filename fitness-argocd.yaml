apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fitness-argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/muhammedsinanust/Fitness_Tracker
    targetRevision: master
    path: Fitness_Chart
  destination:
    server: https://kubernetes.default.svc
    namespace: fitness
  syncPolicy:
    automated:
      prune: true
      selfHeal: true